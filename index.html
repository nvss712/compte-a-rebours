<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compte à Rebours</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="relative bg-black text-white flex items-center justify-center min-h-screen bg-cover bg-center bg-no-repeat" 
      style="background-image: url('SA400279.JPG');">

    <div class="absolute inset-0 bg-black/60 z-0"></div>

    <div class="relative z-10 text-center px-4">
        <h1 class="text-xl md:text-3xl mb-8 font-light tracking-[0.2em] uppercase opacity-90">
            48°52'16.4"N 2°30'07.6"E
        </h1>
        <div id="timer" class="text-5xl md:text-8xl font-mono font-bold flex gap-4 justify-center">
            </div>
    </div>

    <script>
        // Ta date cible : 20 mars 2026 à 21h30
        const targetDate = new Date("March 20, 2026 21:30:00").getTime();
        
        function updateTimer() {
            const now = new Date().getTime();
            const diff = targetDate - now;
            
            if (diff <= 0) {
                document.getElementById('timer').innerHTML = "ARRIVÉE";
                return;
            }

            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);
            
            // Formatage 00 pour plus de propreté
            const format = (num) => String(num).padStart(2, '0');

            document.getElementById('timer').innerHTML = `
                <div class="flex flex-col"><span class="leading-none">${format(d)}</span><span class="text-xs uppercase font-light mt-2">Jours</span></div>
                <div class="flex flex-col"><span class="leading-none">${format(h)}</span><span class="text-xs uppercase font-light mt-2">Hrs</span></div>
                <div class="flex flex-col"><span class="leading-none">${format(m)}</span><span class="text-xs uppercase font-light mt-2">Min</span></div>
                <div class="flex flex-col"><span class="leading-none">${format(s)}</span><span class="text-xs uppercase font-light mt-2">Sec</span></div>
            `;
        }
        setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>
</html>
