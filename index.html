<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compte à Rebours - Mystère</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { font-family: 'JetBrains+Mono', monospace; }
    </style>
</head>
<body class="relative bg-black text-white flex items-center justify-center min-h-screen overflow-hidden">

    <div class="absolute inset-0 bg-cover bg-center bg-no-repeat scale-110 blur-md" 
         style="background-image: url('SA400279.JPG');"></div>

    <div class="absolute inset-0 bg-black/50 z-0"></div>

    <div class="relative z-10 text-center px-6 py-12 backdrop-blur-sm bg-black/20 rounded-2xl border border-white/10 shadow-2xl">
        <h1 class="text-lg md:text-2xl mb-10 font-light tracking-[0.3em] text-gray-300">
            48°52'16.4"N 2°30'07.6"E
        </h1>
        
        <div id="timer" class="flex gap-6 md:gap-12 justify-center items-center">
            </div>
    </div>

    <script>
        const targetDate = new Date("March 20, 2026 21:30:00").getTime();
        
        function updateTimer() {
            const now = new Date().getTime();
            const diff = targetDate - now;
            
            if (diff <= 0) {
                document.getElementById('timer').innerHTML = "<span class='text-4xl tracking-widest'>COORDONNÉES ATTEINTES</span>";
                return;
            }

            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);
            
            const format = (n) => String(n).padStart(2, '0');

            const createBlock = (val, label) => `
                <div class="flex flex-col">
                    <span class="text-4xl md:text-7xl font-bold tabular-nums">${format(val)}</span>
                    <span class="text-[10px] md:text-xs uppercase tracking-[0.2em] text-gray-400 mt-2">${label}</span>
                </div>`;

            document.getElementById('timer').innerHTML = 
                createBlock(d, 'Jours') + createBlock(h, 'Heures') + 
                createBlock(m, 'Min') + createBlock(s, 'Sec');
        }

        setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>
</html>
